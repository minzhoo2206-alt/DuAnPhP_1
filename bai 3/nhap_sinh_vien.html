<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập thông tin sinh viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1a6fa0;
        }
    </style>
</head>
<body>
    <h1>Nhập thông tin sinh viên</h1>
 
    <form action="luu_sinh_vien.php" method="post">
 
        <label for="mssv">Mã số sinh viên:</label>
        <input type="text" id="mssv" name="mssv" placeholder="VD: SV001" required>
 
        <label for="hoTen">Họ tên:</label>
        <input type="text" id="hoTen" name="hoTen" placeholder="VD: Nguyễn Văn A" required>
 
        <label for="gioiTinh">Giới tính:</label>
        <select id="gioiTinh" name="gioiTinh" required>
            <option value="">-- Chọn giới tính --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
        </select>
 
        <label for="ngaySinh">Ngày sinh:</label>
        <input type="date" id="ngaySinh" name="ngaySinh" required>
 
        <label for="diemTB">Điểm TB:</label>
        <input type="number" step="0.01" min="0" max="10" id="diemTB" name="diemTB" placeholder="VD: 8.5" required>
 
        <button type="submit">Lưu sinh viên</button>
    </form>
</body>
</html>
